name: advanced_calculator
description: An advanced calculator for Windows.
publish_to: 'none'
version: 1.0.1+1 # نسخه فعلی برنامه

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  url_launcher: ^6.1.14
  package_info_plus: ^4.2.0
  math_expressions: ^2.4.0
  window_manager: ^0.3.8 # برای کنترل پنجره ویندوز
  auto_size_text: ^3.0.0 # برای تغییر سایز خودکار متن

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0 # آپدیت شده برای دارت ۳

flutter:
  uses-material-design: true
