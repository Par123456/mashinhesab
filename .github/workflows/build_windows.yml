name: Build and Release Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Enable Windows Desktop & Create Platform Files
        run: |
          flutter config --enable-windows-desktop
          flutter create --platforms=windows .

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Archive Release Folder
        shell: pwsh
        run: |
          $source = "build\windows\x64\runner\Release"
          $dest = "AdvancedCalculator_Windows.zip"
          Compress-Archive -Path "$source\*" -DestinationPath $dest

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: AdvancedCalculator_Windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
